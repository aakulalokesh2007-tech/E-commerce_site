<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Storefront</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 🔵 Navigation Bar */
        .navbar {
            background: linear-gradient(135deg, #00B4DB, #0083B0);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .navbar h2 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-btn:hover {
            background: #ff416c; /* Turns red on hover to indicate exit */
        }

        /* 🛍️ Store Layout */
        .store-container {
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .store-header {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        /* Dynamic Product Grid */
        .product-grid {
            display: grid;
            /* Automatically fits as many cards as possible per row */
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
        }

        /* Individual Product Card */
        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .product-icon {
            font-size: 3rem;
            color: #00B4DB;
            text-align: center;
            margin-bottom: 15px;
        }

        .product-category {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .product-name {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .product-price {
            font-size: 1.4rem;
            color: #0083B0;
            font-weight: bold;
            margin-bottom: 15px;
        }

        /* Stock Status */
        .stock-status {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .in-stock { color: #1cc88a; }
        .out-of-stock { color: #e74a3b; }

        /* Add to Cart Button */
        .add-to-cart-btn {
            width: 100%;
            padding: 10px;
            background: #00B4DB;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .add-to-cart-btn:hover {
            background: #0083B0;
        }

        .add-to-cart-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .loading-text {
            text-align: center;
            color: #888;
            grid-column: 1 / -1;
            font-size: 1.2rem;
            padding: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <h2><i class="fa-solid fa-store"></i> MyStore</h2>

        <a href="user_orders.html" style="color: white; text-decoration: none; font-weight: bold; margin-right: 15px;">
                <i class="fa-solid fa-clipboard-list"></i> My Orders
            </a>

       
       <a href="cart.html" style="color: white; text-decoration: none; font-weight: bold; margin-right: 15px;">
                <i class="fa-solid fa-cart-shopping"></i> Cart
            </a>
       
       
       
        <div class="nav-actions">
            <span><i class="fa-solid fa-user-circle"></i> Welcome!</span>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        
    </nav>

    <div class="store-container">
        <div class="store-header">
            <h1>Featured Products</h1>
            <p>Browse our latest catalog</p>
        </div>

        <div class="product-grid" id="productGrid">
            <div class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading store...</div>
        </div>
    </div>

    <script>
        // 1. Handle Logout
        function handleLogout() {
            if(confirm("Are you sure you want to log out?")) {
                window.location.href = 'userlogin.html';
            }
        }

        // 2. Fetch and Display Products
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('productGrid');

            try {
                // Fetch products using the route we built earlier
                const response = await fetch('/api/products');
                const products = await response.json();

                grid.innerHTML = ''; // Clear loading text

                if (products.length === 0) {
                    grid.innerHTML = `<div class="loading-text">No products available at the moment. Please check back later!</div>`;
                    return;
                }

                // Loop through the database and create a card for each product
                products.forEach(product => {
                    // Check stock to style the text and disable the button if necessary
                    const isOutOfStock = product.stock === 0;
                    const stockText = isOutOfStock ? 'Out of Stock' : `${product.stock} In Stock`;
                    const stockClass = isOutOfStock ? 'out-of-stock' : 'in-stock';
                    const buttonState = isOutOfStock ? 'disabled' : '';
                    const buttonText = isOutOfStock ? 'Unavailable' : 'Add to Cart';

                    // Assign an icon based on category (just a fun visual touch!)
                    let icon = 'fa-box';
                    if(product.category.toLowerCase() === 'electronics') icon = 'fa-laptop';
                    if(product.category.toLowerCase() === 'clothing') icon = 'fa-shirt';

                    // Create the HTML card
                    // Create the HTML card
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <div>
                            <div class="product-icon"><i class="fa-solid ${icon}"></i></div>
                            <div class="product-category">${product.category}</div>
                            <div class="product-name">${product.name}</div>
                            <div class="product-price">$${product.price.toFixed(2)}</div>
                            <div class="stock-status ${stockClass}">${stockText}</div>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 15px;">
                            <a href="product_details.html?id=${product._id}" style="flex: 1; text-align: center; padding: 10px; background: #e0f7fa; color: #0083B0; text-decoration: none; border-radius: 6px; font-weight: bold;">
                                Details
                            </a>
                            <button class="add-to-cart-btn" ${buttonState} onclick="addToCart('${product._id}', '${product.name}', ${product.price})">
                                <i class="fa-solid fa-cart-plus"></i> Cart
                                    </button>
                        </div>
                    
                        
                    `;
                    
                    grid.appendChild(card);
                });

            } catch (error) {
                console.error('Error fetching products:', error);
                grid.innerHTML = `<div class="loading-text" style="color: red;">Failed to load the store catalog.</div>`;
            }
        });

        // The real Add to Cart logic
        function addToCart(id, name, price) {
            // 1. Get the current cart from memory, or start an empty one if it doesn't exist
            let cart = JSON.parse(localStorage.getItem('myCart')) || [];
            
            // 2. Check if this exact item is already in the cart
            let existingItem = cart.find(item => item.id === id);
            
            if (existingItem) {
                // If it's already there, just increase the quantity
                existingItem.quantity += 1;
            } else {
                // If it's new, add it to the cart list
                cart.push({ id: id, name: name, price: price, quantity: 1 });
            }
            
            // 3. Save the updated cart back into the browser's memory
            localStorage.setItem('myCart', JSON.stringify(cart));
            
            alert(`Success! Added ${name} to your cart.`);
        }
    </script>

</body>
</html>

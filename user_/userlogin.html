<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 🔵 Matching the User Button Gradient from your Main Portal */
        body {
            background: linear-gradient(135deg, #00B4DB, #0083B0);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* ⬅️ Back Button */
        .back-btn {
            position: absolute;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        /* Login Box */
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }

        .login-box h2 {
            color: #0083B0;
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px; /* Padding on left for the icon */
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00B4DB;
        }

        /* Submit Button */
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #00B4DB;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background: #0083B0;
        }

        /* Links */
        .signup-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .signup-link a {
            color: #00B4DB;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: #0083B0;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <a href="/" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Main Menu
    </a>

    <div class="login-box">
        <h2><i class="fa-solid fa-user-astronaut"></i> User Login</h2>
        
        <form id="userLoginForm">
            <div class="input-group">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="userEmail" placeholder="Email Address" required>
            </div>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="userPassword" placeholder="Password" required>
            </div>
            
            <button type="submit">Login</button>
        </form>

        <p class="signup-link">
            Don't have an account? <a href="registration.html">register here</a>
        </p>
    </div>

    <script>
        document.getElementById('userLoginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const email = document.getElementById('userEmail').value.trim();
            const password = document.getElementById('userPassword').value.trim();

            try {
                // Pointing to the new User login route we made in server.js
                const response = await fetch('/api/user/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Welcome back, ' + data.user.fullName + '!');
                    // Redirect to the user storefront (we will build this next!)

                    localStorage.setItem('loggedInUser', data.user.fullName);

                    
                    window.location.href = 'user_home.html'; 
                } else {
                    alert(data.message); // E.g., "Invalid email or password"
                }

            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to the server.');
            }
        });
    </script>

</body>
</html>

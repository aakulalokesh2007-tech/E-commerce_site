<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* Universal reset */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff7e5f, #feb47b);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative; 
}

/* ⬅️ Back Button Styling */
.back-btn {
    position: absolute;
    top: 30px;
    left: 30px;
    background: rgba(255, 255, 255, 0.2); 
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: all 0.3s ease;
}

.back-btn:hover {
    background: rgba(255, 255, 255, 0.4);
    transform: translateX(-5px); 
}

/* Login Box Styling */
.login-box {
    background: white;
    padding: 60px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.2); 
    text-align: center;
    width: 300px;
}

h2 {
    color: #ff7e5f;
    margin-bottom: 20px; 
}

input {
    width: 100%; 
    padding: 10px;
    margin-bottom: 15px; 
    border: 1px solid #ccc;
    border-radius: 5px;
}

input:focus {
    outline: none;
    border-color: #ff7e5f;
}

/* Login Button Styling */
button[type="submit"] {
    width: 100%;
    padding: 10px;
    background: #ff7e5f;
    color: white;
    border: none;
    border-radius: 5px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.3s ease; 
}

button[type="submit"]:hover {
    background: #ff4b2b;
}

/* 🔗 NEW: Create Account Link Styling */
.signup-link {
    margin-top: 15px;
    font-size: 14px;
    color: #666;
}

.signup-link a {
    color: #ff7e5f;
    text-decoration: none;
    font-weight: bold;
    transition: color 0.3s ease;
}

.signup-link a:hover {
    color: #ff4b2b;
    text-decoration: underline;
}

/* Responsive adjustment */
@media (max-width: 600px) {
    .back-btn {
        top: 20px;
        left: 20px;
    }
}
</style>
</head>

<body>


<a href="/"><button class="back-btn">
    <i class="fa-solid fa-arrow-left"></i> Back
</button></a>
   
<div class="login-box">
    <h2>Admin Login</h2>
    
    <form id="loginForm">
        <input type="text" placeholder="Username" required id="loginEmail">
        <input type="password" placeholder="Password" required id="loginPassword">
        <button type="submit">Login</button>
    </form>

    <p class="signup-link">
        Don't have an account? <a href="signup.html">Create one</a>
    </p>

</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async function(event) {
        // 1. Stop the page from reloading
        event.preventDefault();

        // 2. Grab the email and password
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        // 3. Send data to the backend
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    email: email, 
                    password: password 
                })
            });

            const data = await response.json();

            // 4. Handle the server's response
            if (response.ok) {
                alert('Welcome back!');
                // Redirect to the dashboard upon success
                window.location.href = 'admin_dashboard.html'; 
            } else {
                // Show the error (e.g., "Invalid email or password")
                alert(data.message);
            }
        } catch (error) {
            console.error('Error connecting to the server:', error);
            alert('Failed to connect to the server.');
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
        /* Universal Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 🆕 Updated Header Styling */
        .header {
            width: 100%;
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 40px; /* Added side padding */
            display: flex; /* Flexbox allows side-by-side layout */
            justify-content: space-between; /* Pushes items to opposite ends */
            align-items: center; /* Vertically centers them */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 50px;
        }

        .header h2 {
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        /* 🆕 Top-Right Logout Button Styling */
        .header-logout-btn {
            background: #ff416c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logout-btn:hover {
            background: #ff4b2b;
            transform: scale(1.05); /* Slight pop effect */
        }

        /* Card Container */
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap; 
            gap: 30px;
            padding: 20px;
            max-width: 1000px;
        }

        /* Individual Card Styling */
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 220px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.25);
        }

        .card i {
            font-size: 3rem;
            color: #4facfe;
            margin-bottom: 10px;
        }

        .card h3 {
            color: #333;
            font-size: 1.2rem;
        }

        /* General Card Button Styling */
        .card button {
            padding: 12px 25px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s ease;
        }

        .card button:hover {
            background: #007bff;
        }

    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fa-solid fa-chart-line"></i> Admin Dashboard</h2>
        
        <button class="header-logout-btn" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
    </div>

    <div class="container">

        <div class="card">
            <i class="fa-solid fa-box-open"></i>
            <h3>Add Product</h3>
            <button onclick="location.href='add_product.html'">Open</button>
        </div>

        <div class="card">
            <i class="fa-solid fa-users"></i>
            <h3>View Customers</h3>
            <button onclick="location.href='view_customers.html'">Open</button>
        </div>

        <div class="card">
            <i class="fa-solid fa-cart-shopping"></i>
            <h3>View Orders</h3>
            <button onclick="location.href='view_orders.html'">Open</button>
        </div>

        <div class="card">
            <i class="fa-solid fa-pen-to-square"></i>
            <h3>Modify Products</h3>
            <button onclick="location.href='modify_products.html'">Open</button>
        </div>
        

    </div>

    <script>
        function handleLogout() {
            const confirmLogout = confirm("Are you sure you want to log out?");
            if (confirmLogout) {
                window.location.href = 'adminlogin.html'; 
            }
        }
    </script>

</body>
</html>

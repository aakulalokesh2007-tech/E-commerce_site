<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Products | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Universal Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #4facfe, #00f2fe); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Header Styling */
        .header { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px); 
            color: white; 
            padding: 15px 40px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); 
            margin-bottom: 30px; 
        }
        .header h2 { font-size: 1.8rem; letter-spacing: 1px; }
        
        /* Back Button */
        .btn-back { 
            background: rgba(255, 255, 255, 0.2); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-size: 1rem;
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-back:hover { background: rgba(255, 255, 255, 0.4); transform: scale(1.05); }

        /* Table Container */
        .table-container { 
            background: white; 
            width: 90%; 
            max-width: 1000px; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); 
            overflow-x: auto; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; color: #333; }
        
        /* Action Buttons */
        .action-btn { 
            padding: 8px 12px; 
            border: none; 
            border-radius: 5px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            transition: 0.3s; 
            margin-right: 5px; 
        }
        .btn-edit { background: #f39c12; }
        .btn-edit:hover { background: #e67e22; }
        .btn-delete { background: #e74c3c; }
        .btn-delete:hover { background: #c0392b; }

        /* Edit Modal (Hidden by default) */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.5); 
            justify-content: center; 
            align-items: center; 
            backdrop-filter: blur(5px); 
        }
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            width: 400px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        .modal-content h3 { text-align: center; color: #333; font-size: 1.5rem; margin-bottom: 10px; }
        .modal-content input, .modal-content textarea { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            font-size: 1rem;
        }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 10px; }
        .btn-save { background: #2ecc71; width: 48%; }
        .btn-save:hover { background: #27ae60; }
        .btn-cancel { background: #95a5a6; width: 48%; }
        .btn-cancel:hover { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fa-solid fa-pen-to-square"></i> Modify Products</h2>
        <button class="btn-back" onclick="location.href='admin_dashboard.html'">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Price (₹)</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                </tbody>
        </table>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>Edit Product</h3>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="Product Name" required>
            <input type="text" id="editCategory" placeholder="Category" required>
            <input type="number" id="editPrice" placeholder="Price (₹)" required>
            <input type="number" id="editStock" placeholder="Stock Level" required>
            <textarea id="editDescription" placeholder="Description" rows="3"></textarea>
            
            <div class="modal-actions">
                <button class="action-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="action-btn btn-save" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Store products globally
        let productsList = [];

        // 1. Fetch all products (Works on Localhost & Render)
        async function fetchProducts() {
            const tableBody = document.getElementById('productTableBody');
            tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#555;">Loading products...</td></tr>`;

            try {
                // 👇 Relative path: Works seamlessly on Render and Localhost!
                const response = await fetch('/api/products'); 
                productsList = await response.json(); 

                tableBody.innerHTML = ''; // Clear loading text

                if (productsList.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#888;">No products found in the database.</td></tr>`;
                    return;
                }

                productsList.forEach(product => {
                    const row = `
                        <tr>
                            <td><strong>${product.name}</strong></td>
                            <td>${product.category}</td>
                            <td>₹${product.price}</td>
                            <td>${product.stock}</td>
                            <td>
                                <button class="action-btn btn-edit" onclick="openModal('${product._id}')"><i class="fa-solid fa-pen"></i> Edit</button>
                                <button class="action-btn btn-delete" onclick="deleteProduct('${product._id}')"><i class="fa-solid fa-trash"></i> Delete</button>
                            </td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });

            } catch (error) {
                console.error('Error loading products:', error);
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:red;">Failed to load products. Is the server running?</td></tr>`;
            }
        }

        // 2. Delete a product
        async function deleteProduct(productId) {
            if (confirm("Are you sure you want to delete this product? This cannot be undone.")) {
                try {
                    // 👇 Relative path
                    const response = await fetch(`/api/products/${productId}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        alert("Product deleted successfully!");
                        fetchProducts(); // Refresh the table automatically
                    } else {
                        alert("Failed to delete product.");
                    }
                } catch (error) {
                    console.error("Error deleting product:", error);
                }
            }
        }

        // 3. Handle the Edit Modal (UI Only)
        function openModal(productId) {
            const product = productsList.find(p => p._id === productId);
            
            document.getElementById('editId').value = product._id;
            document.getElementById('editName').value = product.name;
            document.getElementById('editCategory').value = product.category;
            document.getElementById('editPrice').value = product.price;
            document.getElementById('editStock').value = product.stock;
            document.getElementById('editDescription').value = product.description || "";

            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // 4. Save the updated product
        async function saveEdit() {
            const productId = document.getElementById('editId').value;
            
            const updatedData = {
                name: document.getElementById('editName').value,
                category: document.getElementById('editCategory').value,
                price: document.getElementById('editPrice').value,
                stock: document.getElementById('editStock').value,
                description: document.getElementById('editDescription').value
            };

            try {
                // 👇 Relative path
                const response = await fetch(`/api/products/${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                if (response.ok) {
                    alert("Product updated successfully!");
                    closeModal();
                    fetchProducts(); // Refresh the table
                } else {
                    alert("Failed to update product.");
                }
            } catch (error) {
                console.error("Error updating product:", error);
            }
        }

        // Load data automatically when the page starts
        window.onload = fetchProducts;
    </script>

</body>
</html>

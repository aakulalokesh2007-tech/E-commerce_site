<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Products | Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #4facfe, #00f2fe); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        
        /* Header */
        .header { width: 100%; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); color: white; padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); margin-bottom: 30px; }
        .btn-back { background: rgba(255, 255, 255, 0.2); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-back:hover { background: rgba(255, 255, 255, 0.4); }

        /* Table Container */
        .table-container { background: white; width: 90%; max-width: 1000px; padding: 20px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f8f9fa; color: #333; }
        
        /* Action Buttons */
        .action-btn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; margin-right: 5px; }
        .btn-edit { background: #f39c12; }
        .btn-edit:hover { background: #e67e22; }
        .btn-delete { background: #e74c3c; }
        .btn-delete:hover { background: #c0392b; }

        /* Edit Modal (Hidden by default) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .modal-content h3 { text-align: center; color: #333; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 10px; }
        .btn-save { background: #2ecc71; width: 48%; }
        .btn-save:hover { background: #27ae60; }
        .btn-cancel { background: #95a5a6; width: 48%; }
        .btn-cancel:hover { background: #7f8c8d; }
    </style>
</head>
<body>

    <div class="header">
        <h2><i class="fa-solid fa-pen-to-square"></i> Modify Products</h2>
        <button class="btn-back" onclick="location.href='admin_dashboard.html'"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Product Name</th>
                    <th>Category</th>
                    <th>Price (₹)</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productTableBody">
                </tbody>
        </table>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3>Edit Product</h3>
            <input type="hidden" id="editId">
            <input type="text" id="editName" placeholder="Product Name" required>
            <input type="text" id="editCategory" placeholder="Category" required>
            <input type="number" id="editPrice" placeholder="Price" required>
            <input type="number" id="editStock" placeholder="Stock Level" required>
            <textarea id="editDescription" placeholder="Description" rows="3"></textarea>
            
            <div class="modal-actions">
                <button class="action-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="action-btn btn-save" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Store products globally so we can easily edit them
        let productsList = [];

        // 1. Fetch all products when the page loads
        async function fetchProducts() {
            try {
                const response = await fetch('http://localhost:3000/api/products');
                productsList = await response.json();
                renderTable();
            } catch (error) {
                console.error("Error fetching products:", error);
                alert("Failed to load products. Make sure your server is running!");
            }
        }

        // 2. Put the products into the HTML table
        function renderTable() {
            const tableBody = document.getElementById('productTableBody');
            tableBody.innerHTML = ''; // Clear table

            productsList.forEach(product => {
                const row = `
                    <tr>
                        <td><strong>${product.name}</strong></td>
                        <td>${product.category}</td>
                        <td>₹${product.price}</td>
                        <td>${product.stock}</td>
                        <td>
                            <button class="action-btn btn-edit" onclick="openModal('${product._id}')"><i class="fa-solid fa-pen"></i> Edit</button>
                            <button class="action-btn btn-delete" onclick="deleteProduct('${product._id}')"><i class="fa-solid fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        }

        // 3. Delete a product
        async function deleteProduct(productId) {
            if (confirm("Are you sure you want to delete this product? This cannot be undone.")) {
                try {
                    const response = await fetch(`http://localhost:3000/api/products/${productId}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        alert("Product deleted successfully!");
                        fetchProducts(); // Refresh the table
                    } else {
                        alert("Failed to delete product.");
                    }
                } catch (error) {
                    console.error("Error deleting product:", error);
                }
            }
        }

        // 4. Handle the Edit Modal
        function openModal(productId) {
            // Find the exact product from our array
            const product = productsList.find(p => p._id === productId);
            
            // Fill the modal inputs with current data
            document.getElementById('editId').value = product._id;
            document.getElementById('editName').value = product.name;
            document.getElementById('editCategory').value = product.category;
            document.getElementById('editPrice').value = product.price;
            document.getElementById('editStock').value = product.stock;
            document.getElementById('editDescription').value = product.description || "";

            // Show the modal
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        // 5. Save the updated product
        async function saveEdit() {
            const productId = document.getElementById('editId').value;
            
            // Gather updated data from inputs
            const updatedData = {
                name: document.getElementById('editName').value,
                category: document.getElementById('editCategory').value,
                price: document.getElementById('editPrice').value,
                stock: document.getElementById('editStock').value,
                description: document.getElementById('editDescription').value
            };

            try {
                const response = await fetch(`http://localhost:3000/api/products/${productId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                if (response.ok) {
                    alert("Product updated successfully!");
                    closeModal();
                    fetchProducts(); // Refresh the table with new data
                } else {
                    alert("Failed to update product.");
                }
            } catch (error) {
                console.error("Error updating product:", error);
            }
        }

        // Run fetchProducts immediately when the page opens
        window.onload = fetchProducts;
    </script>

</body>
</html>

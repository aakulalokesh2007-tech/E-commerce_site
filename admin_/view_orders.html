<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Orders</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* ⬅️ Back Button */
        .back-btn {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-bottom: 30px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateX(-5px);
        }

        /* Table Container */
        .table-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 900px;
        }

        .table-container h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #f8f9fa;
            color: #555;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: #f1f9ff;
        }

        /* Dynamic Status Badges */
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
        }

        .status-pending { background-color: #f6c23e; } /* Yellow */
        .status-shipped { background-color: #36b9cc; } /* Blue */
        .status-delivered { background-color: #1cc88a; } /* Green */

        .loading-text {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>

    <a href="admin_dashboard.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
    </a>

    <div class="table-container">
        <h2><i class="fa-solid fa-cart-shopping" style="color: #4facfe;"></i> Order Management</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Customer</th>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Total</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="ordersTableBody">
                <tr>
                    <td colspan="6" class="loading-text"><i class="fa-solid fa-spinner fa-spin"></i> Loading orders...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const tableBody = document.getElementById('ordersTableBody');

            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();

                tableBody.innerHTML = '';

                if (orders.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:#888;">No orders have been placed yet.</td></tr>`;
                    return;
                }

                orders.forEach(order => {
                    // Format the date to look clean (e.g., "3/23/2026")
                    const dateObj = new Date(order.orderDate);
                    const formattedDate = dateObj.toLocaleDateString();

                    // Determine the CSS class for the status badge
                    let statusClass = 'status-pending';
                    if (order.status.toLowerCase() === 'shipped') statusClass = 'status-shipped';
                    if (order.status.toLowerCase() === 'delivered') statusClass = 'status-delivered';

                    const row = document.createElement('tr');
                    
                    row.innerHTML = `
                        <td>${formattedDate}</td>
                        <td><strong>${order.customerName}</strong></td>
                        <td>${order.productName}</td>
                        <td>${order.quantity}</td>
                        <td>$${order.totalPrice.toFixed(2)}</td>
                        <td><span class="status ${statusClass}">${order.status}</span></td>
                    `;
                    
                    tableBody.appendChild(row);
                });

            } catch (error) {
                console.error('Error fetching orders:', error);
                tableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Failed to load order data.</td></tr>`;
            }
        });
    </script>

</body>
</html>
